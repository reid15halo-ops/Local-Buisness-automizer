<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net https://analytics.freyaivisions.de; connect-src 'self' https://analytics.freyaivisions.de https://incbhhaiiayohrjqevog.supabase.co wss://incbhhaiiayohrjqevog.supabase.co; img-src 'self' data: blob:; font-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests;">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <title>FreyAI Visions | Login</title>
    <!-- Self-hosted fonts (GDPR/DSGVO compliant - no Google Fonts CDN) -->
    <link rel="preload" href="fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="css/fonts.css">
    <style>
        :root {
            --bg: #131516;
            --bg-card: #1c1f22;
            --accent: #c8956c;
            --accent-hover: #daa882;
            --success: #5a9e6f;
            --danger: #c45c5c;
            --text: #e8e4df;
            --text-secondary: #9a958e;
            --text-muted: #706b64;
            --border: #2a2d31;
            --radius: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo .brand {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: var(--accent);
            color: #131516;
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #131516;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            box-shadow: 0 2px 8px rgba(200, 149, 108, 0.25);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--accent-hover);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }

        .auth-link:hover { text-decoration: underline; }

        .auth-message {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .auth-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .auth-message.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-demo {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-demo:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .setup-notice {
            text-align: center;
            padding: 16px;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .setup-notice a {
            color: var(--accent-hover);
            text-decoration: none;
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            line-height: 1;
            opacity: 0.5;
        }
        .password-toggle:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <img src="img/hero-logo.png" alt="FreyAI Visions" width="80" height="80" style="margin-bottom: 16px; border-radius: 16px;">
            <div class="brand">FreyAI Visions</div>
            <p>Prozesse automatisieren. Intelligent.</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Anmelden</button>
                <button class="auth-tab" data-tab="register">Registrieren</button>
            </div>

            <div id="auth-message" class="auth-message"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="form-login">
                <div class="form-group">
                    <label for="login-email">E-Mail</label>
                    <input type="email" id="login-email" placeholder="deine@email.de" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Passwort</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Dein Passwort" required autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Passwort anzeigen" tabindex="-1">&#x1F441;</button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-login">Anmelden</button>
                <a class="auth-link" id="link-forgot">Passwort vergessen?</a>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="form-register">
                <div class="form-group">
                    <label for="reg-company">Firmenname</label>
                    <input type="text" id="reg-company" placeholder="z.B. FreyAI Visions" required>
                </div>
                <div class="form-group">
                    <label for="reg-name">Vor- und Nachname</label>
                    <input type="text" id="reg-name" placeholder="Max Mustermann" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">E-Mail</label>
                    <input type="email" id="reg-email" placeholder="deine@email.de" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Passwort (min. 8 Zeichen)</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="Sicheres Passwort" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Passwort anzeigen" tabindex="-1">&#x1F441;</button>
                    </div>
                </div>
                <label style="font-size: 13px; color: var(--text-muted, #a1a1aa); margin: 8px 0; display: block; cursor: pointer;">
                    <input type="checkbox" id="register-agb-checkbox" required style="margin-right: 6px; vertical-align: middle;">
                    Ich akzeptiere die <a href="agb.html" target="_blank" style="color: var(--accent, #6366f1);">AGB</a> und <a href="datenschutz.html" target="_blank" style="color: var(--accent, #6366f1);">Datenschutzerkl&auml;rung</a>.
                </label>
                <button type="submit" class="btn-submit" id="btn-register">Kostenlos registrieren</button>
            </form>

            <!-- Reset Form (hidden by default) -->
            <form class="auth-form" id="form-reset">
                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 20px;">
                    Gib deine E-Mail ein und wir senden dir einen Link zum Zurücksetzen.
                </p>
                <div class="form-group">
                    <label for="reset-email">E-Mail</label>
                    <input type="email" id="reset-email" placeholder="deine@email.de" required>
                </div>
                <button type="submit" class="btn-submit">Link senden</button>
                <a class="auth-link" id="link-back-login">Zurück zum Login</a>
            </form>

            <div class="auth-divider">oder</div>

            <button class="btn-demo" id="btn-demo">
                Demo ohne Anmeldung testen
            </button>
        </div>

        <div class="setup-notice" id="setup-notice" style="display:none;">
            Supabase nicht konfiguriert.
            <a href="index.html#einstellungen">Einstellungen &ouml;ffnen</a>
        </div>
    </div>

    <footer style="text-align:center;padding:16px;font-size:13px;color:#71717a;">
        <a href="impressum.html" style="color:#71717a;text-decoration:none;">Impressum</a> &middot;
        <a href="datenschutz.html" style="color:#71717a;text-decoration:none;">Datenschutz</a> &middot;
        <a href="agb.html" style="color:#71717a;text-decoration:none;">AGB</a>
    </footer>

    <!-- Supabase CDN (with SRI verification) -->
    <!-- See COMPUTE_SRI_HASHES.md for hash computation instructions -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
    <script src="js/services/supabase-config.js"></script>
    <script src="js/services/supabase-client.js"></script>
    <script src="js/services/auth-service.js"></script>
    <script src="js/services/security-service.js"></script>
    <script src="js/auth-page.js"></script>
</body>
</html>
